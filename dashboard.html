<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard lịch sử khám — prototype</title>
<style>
  *{box-sizing:border-box;margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  body{background:#f1f5f9;color:#0f172a;padding:16px;font-size:14px;line-height:1.4}
  .wrap{max-width:920px;margin:0 auto;display:flex;flex-direction:column;gap:14px}

  /* HEADER */
  .hd{background:linear-gradient(135deg,#0ea5e9,#2563eb);color:#fff;border-radius:16px;padding:18px 22px;box-shadow:0 4px 14px rgba(37,99,235,.18)}
  .hd h1{font-size:21px;font-weight:700;letter-spacing:-.01em}
  .hd p{opacity:.92;margin-top:4px;font-size:13px}

  /* TAB NAV */
  .nav{display:flex;gap:6px;background:#fff;border:1px solid #e2e8f0;border-radius:999px;padding:5px;position:sticky;top:8px;z-index:5;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .nav button{flex:1;border:0;background:transparent;color:#475569;border-radius:999px;padding:9px 12px;cursor:pointer;font-size:14px;font-weight:600;transition:.15s}
  .nav button:hover{background:#f1f5f9}
  .nav button.on{background:#2563eb;color:#fff}

  .tabpane{display:none;flex-direction:column;gap:14px;animation:fade .25s ease}
  .tabpane.on{display:flex}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* CARDS */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .card{background:#fff;border:1px solid #e2e8f0;border-radius:13px;padding:14px 15px}
  .card .lbl{font-size:12px;color:#64748b}
  .card .val{font-size:19px;font-weight:700;margin-top:4px;color:#1e3a8a}
  .card .val.warn{color:#b91c1c}
  .card .sub{font-size:11px;color:#94a3b8;margin-top:2px}

  .panel{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:16px 18px}
  .panel > h2{font-size:15px;font-weight:700;margin-bottom:4px;color:#0f172a;display:flex;align-items:center;gap:7px}
  .panel > .desc{font-size:12px;color:#64748b;margin-bottom:12px}

  /* CHART GRID */
  .chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px}
  .chart-card{border:1px solid #eef2f7;border-radius:12px;padding:12px 12px 6px;background:#fcfdff}
  .chart-card h3{font-size:13px;font-weight:700;color:#334155;display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .chart-card h3 .u{font-size:11px;font-weight:500;color:#94a3b8}
  .chart-card .flag{font-size:11px;font-weight:600;margin-top:2px}
  .chart-card .flag.bad{color:#dc2626}
  .chart-card .flag.ok{color:#16a34a}
  .chart-card .legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:5px}
  .chart-card .legend .lg{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#64748b}
  .chart-card .legend .lg i{width:11px;height:3px;border-radius:2px;display:inline-block}
  svg.chart{width:100%;height:auto;display:block;margin-top:6px}

  /* TIMELINE */
  .visit{border-left:3px solid #2563eb;padding:4px 0 14px 16px;margin-left:4px;position:relative}
  .visit::before{content:"";position:absolute;left:-7px;top:5px;width:11px;height:11px;border-radius:50%;background:#2563eb;border:2px solid #fff}
  .visit:last-child{padding-bottom:0}
  .visit .d{font-weight:700;color:#1e3a8a;font-size:15px}
  .visit .sub{color:#64748b;font-size:12px;margin:3px 0 8px}
  .visit .row{margin-top:7px}
  .visit .row .k{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.03em;margin-bottom:3px}
  .tag{display:inline-block;background:#eff6ff;color:#1d4ed8;border:1px solid #dbeafe;border-radius:7px;padding:2px 9px;margin:0 5px 5px 0;font-size:12px}
  .tag.med{background:#f0fdf4;color:#15803d;border-color:#dcfce7}
  .tag.lab{background:#f8fafc;color:#475569;border-color:#e2e8f0}
  .tag.lab.warn{background:#fef2f2;color:#b91c1c;border-color:#fecaca;font-weight:600}
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== HEADER ===== -->
  <div class="hd">
    <h1 id="h-name">Lịch sử khám — —</h1>
    <p id="h-sub">—</p>
  </div>

  <!-- ===== TAB NAV ===== -->
  <div class="nav">
    <button class="on" data-tab="overview">📋 Tổng quan</button>
    <button data-tab="charts">📈 Đồ thị</button>
    <button data-tab="timeline">🗂️ Timeline</button>
  </div>

  <!-- ===== TAB: TỔNG QUAN ===== -->
  <div class="tabpane on" id="tab-overview">
    <div class="cards" id="ov-cards"></div>
    <div class="panel">
      <h2>🔎 Diễn tiến nổi bật</h2>
      <div class="desc" id="ov-note"></div>
    </div>
  </div>

  <!-- ===== TAB: ĐỒ THỊ ===== -->
  <div class="tabpane" id="tab-charts">
    <div class="panel">
      <h2>❤️ Sinh hiệu</h2>
      <div class="desc">Xu hướng các chỉ số sinh hiệu qua từng lần khám.</div>
      <div class="chart-grid" id="vital-charts"></div>
    </div>
    <div class="panel">
      <h2>🧪 Xét nghiệm</h2>
      <div class="desc">Xu hướng các chỉ số xét nghiệm; vùng tô nhạt là khoảng tham chiếu, điểm đỏ là bất thường.</div>
      <div class="chart-grid" id="lab-charts"></div>
    </div>
  </div>

  <!-- ===== TAB: TIMELINE ===== -->
  <div class="tabpane" id="tab-timeline">
    <div class="panel">
      <h2>🗂️ Các lần khám</h2>
      <div class="desc">Sắp xếp mới → cũ.</div>
      <div id="timeline"></div>
    </div>
  </div>

</div>

<script>
/* ============================================================
   DỮ LIỆU MẪU (đúng cấu trúc read_exam_history trả về)
   records: mới nhất trước
   ============================================================ */
const DATA = {
  patientName: "Nguyễn Văn Hùng",
  patientId: "BN001",
  ward: "Nội Tim mạch",
  records: [
    {
      examDate: "2026-06-04", doctorName: "BS. Trần Minh",
      diagnoses: ["Tăng huyết áp", "Nghi suy tim"],
      medications: [{name:"Amlodipine 5mg",instruction:"1 viên/sáng"},{name:"Aspirin 81mg",instruction:"1 viên/tối"}],
      vitals: { bloodPressure:"148/92", heartRate:102, spO2:91, temperature:36.9 },
      labResults: [
        {name:"NT-proBNP", value:2840, unit:"pg/mL", referenceRange:"<125", isAbnormal:true},
        {name:"Creatinine", value:1.4, unit:"mg/dL", referenceRange:"0.7–1.3", isAbnormal:true},
        {name:"HbA1c", value:7.2, unit:"%", referenceRange:"<5.7", isAbnormal:true},
      ],
    },
    {
      examDate: "2026-05-08", doctorName: "BS. Trần Minh",
      diagnoses: ["Tăng huyết áp", "Suy tim"],
      medications: [{name:"Amlodipine 5mg",instruction:"1 viên/sáng"},{name:"Aspirin 81mg",instruction:"1 viên/tối"}],
      vitals: { bloodPressure:"150/95", heartRate:104, spO2:90, temperature:37.0 },
      labResults: [
        {name:"NT-proBNP", value:3300, unit:"pg/mL", referenceRange:"<125", isAbnormal:true},
        {name:"Creatinine", value:1.5, unit:"mg/dL", referenceRange:"0.7–1.3", isAbnormal:true},
        {name:"HbA1c", value:7.5, unit:"%", referenceRange:"<5.7", isAbnormal:true},
      ],
    },
    {
      examDate: "2026-04-08", doctorName: "BS. Trần Minh",
      diagnoses: ["Tăng huyết áp", "Suy tim mất bù"],
      medications: [{name:"Amlodipine 5mg",instruction:"1 viên/sáng"},{name:"Metformin 500mg",instruction:"2 viên/ngày"}],
      vitals: { bloodPressure:"162/100", heartRate:110, spO2:89, temperature:37.2 },
      labResults: [
        {name:"NT-proBNP", value:4200, unit:"pg/mL", referenceRange:"<125", isAbnormal:true},
        {name:"Creatinine", value:1.6, unit:"mg/dL", referenceRange:"0.7–1.3", isAbnormal:true},
        {name:"HbA1c", value:7.8, unit:"%", referenceRange:"<5.7", isAbnormal:true},
      ],
    },
  ],
};

/* records cũ → mới (cho trục thời gian) */
const ASC = [...DATA.records].slice().reverse();
const shortDate = d => d.slice(5); // MM-DD

/* ============================================================
   VẼ MINI LINE CHART (SVG)
   series: [{name, color, vals:[number|null], labels?}]
   opts: {unit, ref:{low?,high?}, abnormal:[bool] (theo series đầu)}
   ============================================================ */
function lineChart(series, dates, opts={}){
  const W=300, H=178, L=44, R=18, T=18, B=28, IN=16;
  const iw=W-L-R, ih=H-T-B, innerW=iw-2*IN;
  let vals=[];
  series.forEach(s=>s.vals.forEach(v=>{ if(v!=null) vals.push(v); }));
  if(opts.ref){ if(opts.ref.low!=null) vals.push(opts.ref.low); if(opts.ref.high!=null) vals.push(opts.ref.high); }
  let mn=Math.min(...vals), mx=Math.max(...vals);
  if(mn===mx){ mn-=1; mx+=1; }
  const pad=(mx-mn)*0.12; mn-=pad; mx+=pad;
  const n=dates.length;
  const X=i=> n===1 ? L+iw/2 : L+IN + i*innerW/(n-1);
  const Y=v=> T + ih - (v-mn)/(mx-mn)*ih;

  let svg=`<svg class="chart" viewBox="0 0 ${W} ${H}" role="img">`;

  // vùng tham chiếu
  if(opts.ref && opts.ref.low!=null && opts.ref.high!=null){
    const y1=Y(opts.ref.high), y2=Y(opts.ref.low);
    svg+=`<rect x="${L}" y="${y1}" width="${iw}" height="${Math.max(0,y2-y1)}" fill="#dcfce7" opacity=".55"/>`;
  } else if(opts.ref && opts.ref.high!=null){
    const yh=Y(opts.ref.high);
    svg+=`<line x1="${L}" y1="${yh}" x2="${W-R}" y2="${yh}" stroke="#86efac" stroke-width="1.5" stroke-dasharray="4 3"/>`;
  } else if(opts.ref && opts.ref.low!=null){
    const yl=Y(opts.ref.low);
    svg+=`<line x1="${L}" y1="${yl}" x2="${W-R}" y2="${yl}" stroke="#86efac" stroke-width="1.5" stroke-dasharray="4 3"/>`;
  }

  // lưới ngang + nhãn trục
  for(let g=0; g<=2; g++){
    const v=mn+(mx-mn)*g/2, y=Y(v);
    svg+=`<line x1="${L}" y1="${y}" x2="${W-R}" y2="${y}" stroke="#eef2f7"/>`;
    svg+=`<text x="${L-6}" y="${y+3}" text-anchor="end" font-size="9" fill="#94a3b8">${(+v.toFixed(v<10?1:0))}</text>`;
  }
  // trục đáy
  svg+=`<line x1="${L}" y1="${T+ih}" x2="${W-R}" y2="${T+ih}" stroke="#cbd5e1"/>`;

  // mỗi series
  series.forEach(s=>{
    const pts=s.vals.map((v,i)=> v==null?null:`${X(i)},${Y(v)}`).filter(Boolean).join(" ");
    svg+=`<polyline fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" points="${pts}"/>`;
    s.vals.forEach((v,i)=>{
      if(v==null) return;
      const ab = opts.abnormal ? opts.abnormal[i] : false;
      const col = ab ? "#dc2626" : s.color;
      // điểm mép: căn nhãn ra phía trong để không đè trục/tràn mép
      const anchor = i===0 ? "start" : (i===n-1 ? "end" : "middle");
      const tx = i===0 ? X(i)-3 : (i===n-1 ? X(i)+3 : X(i));
      svg+=`<circle cx="${X(i)}" cy="${Y(v)}" r="4" fill="${col}"/>`;
      svg+=`<text x="${tx}" y="${Y(v)-9}" text-anchor="${anchor}" font-size="10" font-weight="700" fill="${col}">${v}</text>`;
    });
  });

  // nhãn ngày
  dates.forEach((d,i)=>{
    svg+=`<text x="${X(i)}" y="${H-9}" text-anchor="middle" font-size="9" fill="#94a3b8">${shortDate(d)}</text>`;
  });

  svg+=`</svg>`;
  return svg;
}

function chartCard(title, unit, svg, flag, legend){
  const f = flag ? `<div class="flag ${flag.bad?'bad':'ok'}">${flag.text}</div>` : "";
  const lg = legend ? `<div class="legend">${legend.map(s=>
    `<span class="lg"><i style="background:${s.color}"></i>${s.name}</span>`).join("")}</div>` : "";
  return `<div class="chart-card"><h3><span>${title}</span><span class="u">${unit||""}</span></h3>${f}${lg}${svg}</div>`;
}

/* trend: so sánh lần mới nhất với cũ nhất */
function trendFlag(asc, betterWhenDown){
  const first=asc[0], last=asc[asc.length-1];
  if(first==null||last==null||first===last) return null;
  const down = last<first;
  const improved = betterWhenDown ? down : !down;
  const pct = Math.round(Math.abs(last-first)/Math.abs(first)*100);
  const arrow = down ? "↓" : "↑";
  return { bad:!improved, text:`${arrow} ${pct}% so với lần đầu — ${improved?"cải thiện":"xấu đi"}` };
}

/* ============================================================
   RENDER
   ============================================================ */
const dates = ASC.map(r=>r.examDate);

// header
document.getElementById("h-name").textContent = `Lịch sử khám — ${DATA.patientName} (${DATA.patientId})`;
document.getElementById("h-sub").textContent = `${DATA.ward} · ${DATA.records.length} lần khám · ${dates[0]} → ${dates[dates.length-1]}`;

// ---- TỔNG QUAN ----
const latest = DATA.records[0];
const abnLatest = latest.labResults.filter(l=>l.isAbnormal).map(l=>l.name);
const ovCards = [
  ["Lần khám gần nhất", latest.examDate, latest.doctorName, false],
  ["Chẩn đoán chính", latest.diagnoses[0], latest.diagnoses.slice(1).join(", "), false],
  ["Số thuốc đang dùng", latest.medications.length, latest.medications.map(m=>m.name.split(" ")[0]).join(", "), false],
  ["Huyết áp gần nhất", latest.vitals.bloodPressure, "mmHg", true],
  ["Nhịp tim", latest.vitals.heartRate, "lần/phút", latest.vitals.heartRate>100],
  ["SpO₂", latest.vitals.spO2+"%", "", latest.vitals.spO2<95],
];
document.getElementById("ov-cards").innerHTML = ovCards.map(([l,v,s,w])=>
  `<div class="card"><div class="lbl">${l}</div><div class="val ${w?'warn':''}">${v}</div>${s?`<div class="sub">${s}</div>`:""}</div>`
).join("");

const npro = ASC.map(r=>(r.labResults.find(l=>l.name==="NT-proBNP")||{}).value);
document.getElementById("ov-note").innerHTML =
  `Bệnh nhân <b>${DATA.patientName}</b> theo dõi <b>${latest.diagnoses.join(", ")}</b>. `+
  `NT-proBNP diễn tiến ${npro.join(" → ")} pg/mL (${npro[npro.length-1]<npro[0]?"đang giảm, xu hướng cải thiện":"đang tăng"}) nhưng vẫn cao hơn ngưỡng. `+
  `Hiện còn <b>${abnLatest.length}</b> chỉ số xét nghiệm bất thường: ${abnLatest.join(", ")}.`;

// ---- ĐỒ THỊ: SINH HIỆU ----
const sys = ASC.map(r=>+r.vitals.bloodPressure.split("/")[0]);
const dia = ASC.map(r=>+r.vitals.bloodPressure.split("/")[1]);
const hr  = ASC.map(r=>r.vitals.heartRate);
const spo = ASC.map(r=>r.vitals.spO2);
const temp= ASC.map(r=>r.vitals.temperature);

const vitalCards = [
  chartCard("Huyết áp", "mmHg",
    lineChart([{name:"Tâm thu",color:"#dc2626",vals:sys},{name:"Tâm trương",color:"#f59e0b",vals:dia}], dates, {ref:{high:140}}),
    trendFlag(sys, true),
    [{name:"Tâm thu",color:"#dc2626"},{name:"Tâm trương",color:"#f59e0b"}]),
  chartCard("Nhịp tim", "lần/phút",
    lineChart([{name:"HR",color:"#2563eb",vals:hr}], dates, {ref:{low:60,high:100}, abnormal:hr.map(v=>v>100)}),
    trendFlag(hr, true)),
  chartCard("SpO₂", "%",
    lineChart([{name:"SpO2",color:"#0891b2",vals:spo}], dates, {ref:{low:95}, abnormal:spo.map(v=>v<95)}),
    trendFlag(spo, false)),
  chartCard("Nhiệt độ", "°C",
    lineChart([{name:"Temp",color:"#7c3aed",vals:temp}], dates, {ref:{low:36,high:37.5}}),
    trendFlag(temp, true)),
];
document.getElementById("vital-charts").innerHTML = vitalCards.join("");

// ---- ĐỒ THỊ: XÉT NGHIỆM ----
const labNames = [...new Set(DATA.records.flatMap(r=>r.labResults.map(l=>l.name)))];
const labRefs = {
  "NT-proBNP": {high:125},
  "Creatinine": {low:0.7, high:1.3},
  "HbA1c": {high:5.7},
};
const labColors = {"NT-proBNP":"#dc2626","Creatinine":"#ea580c","HbA1c":"#9333ea"};
const labCards = labNames.map(name=>{
  const series = ASC.map(r=>{ const l=r.labResults.find(x=>x.name===name); return l?l.value:null; });
  const abn    = ASC.map(r=>{ const l=r.labResults.find(x=>x.name===name); return l?!!l.isAbnormal:false; });
  const unit   = (DATA.records.flatMap(r=>r.labResults).find(l=>l.name===name)||{}).unit||"";
  return chartCard(name, unit,
    lineChart([{name,color:labColors[name]||"#475569",vals:series}], dates, {ref:labRefs[name], abnormal:abn}),
    trendFlag(series.filter(v=>v!=null), name!=="HbA1c"?true:true));
});
document.getElementById("lab-charts").innerHTML = labCards.join("");

// ---- TIMELINE ----
document.getElementById("timeline").innerHTML = DATA.records.map(r=>`
  <div class="visit">
    <div class="d">${r.examDate}</div>
    <div class="sub">${r.doctorName} · HA ${r.vitals.bloodPressure} · Nhịp ${r.vitals.heartRate} · SpO₂ ${r.vitals.spO2}% · ${r.vitals.temperature}°C</div>
    <div class="row"><div class="k">Chẩn đoán</div>${r.diagnoses.map(d=>`<span class="tag">${d}</span>`).join("")}</div>
    <div class="row"><div class="k">Thuốc</div>${r.medications.map(m=>`<span class="tag med">💊 ${m.name} · ${m.instruction}</span>`).join("")}</div>
    <div class="row"><div class="k">Xét nghiệm</div>${r.labResults.map(l=>`<span class="tag lab ${l.isAbnormal?'warn':''}">${l.name}: ${l.value} ${l.unit}${l.isAbnormal?' ⚠':''}</span>`).join("")}</div>
  </div>
`).join("");

// ---- TAB SWITCHING ----
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("on", b===btn));
    const t=btn.dataset.tab;
    document.querySelectorAll(".tabpane").forEach(p=>p.classList.toggle("on", p.id==="tab-"+t));
  };
});
</script>
</body>
</html>
